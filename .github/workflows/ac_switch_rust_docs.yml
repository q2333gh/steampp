name: ac_switch_rust docs

on:
  push:
    paths:
      - ".github/workflows/ac_switch_rust_docs.yml"
      - "ac_switch_rust/**"
  pull_request:
    paths:
      - ".github/workflows/ac_switch_rust_docs.yml"
      - "ac_switch_rust/**"

jobs:
  docs:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ac_switch_rust

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

      - name: Build maintainer docs
        run: cargo doc --no-deps --document-private-items

      - name: Install cargo-rdme
        run: cargo install cargo-rdme --version 1.5.0 --locked

      - name: Check README sync
        run: cargo rdme --check
